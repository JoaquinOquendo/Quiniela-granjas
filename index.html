<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Quiniela Granjas · La Gala</title>
<meta property="og:title" content="Quiniela Granjas · La Gala del Mundial 2026">
<meta property="og:description" content="Los premios, las glorias y las vergüenzas. Desliza para ver quién ganó qué.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@500;600&family=Barlow:ital,wght@0,400;0,600;0,800;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0F26; --oro:#FFD100; --azul:#4D7FE3; --rojo:#F04A56;
  --txt:#F6F8FC; --muted:#9AA3C7;
  --panel:rgba(255,255,255,.06); --panel2:rgba(255,255,255,.09); --line:rgba(255,255,255,.13);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
  font-family:'Barlow',system-ui,sans-serif;overscroll-behavior:none}
.display{font-family:'Anton',Impact,sans-serif;letter-spacing:.02em;font-weight:400}
.cond{font-family:'Barlow Condensed',sans-serif}

/* ══ escenario: gradiente profundo + haces de luz de estadio ══ */
#stage{position:fixed;inset:0;background:
  radial-gradient(130% 80% at 50% -15%, rgba(77,127,227,.34) 0%, transparent 58%),
  linear-gradient(180deg, #121A3E 0%, var(--bg) 46%, #070B1C 100%)}
#stage::before{content:'';position:absolute;inset:-20%;pointer-events:none;opacity:.07;
  background:
   conic-gradient(from 205deg at 20% -10%, transparent 0 8deg, #fff 12deg, transparent 17deg 360deg),
   conic-gradient(from 155deg at 80% -10%, transparent 0 8deg, #fff 12deg, transparent 17deg 360deg)}
#stage::after{content:'';position:absolute;inset:0;pointer-events:none;opacity:.45;
  background-image:radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px);
  background-size:26px 26px}

/* ══ barra de progreso tipo stories ══ */
#progress{position:fixed;top:calc(env(safe-area-inset-top,0px) + 10px);left:12px;right:12px;
  display:flex;gap:3px;z-index:40}
#progress .seg{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.20);overflow:hidden}
#progress .seg i{display:block;height:100%;width:0%;background:var(--oro);border-radius:2px;transition:width .25s}
#progress .seg.done i,#progress .seg.active i{width:100%}

/* ══ slides ══ */
.slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;padding:58px 20px 46px;
  opacity:0;transform:translateX(6%);pointer-events:none;transition:opacity .38s,transform .38s}
.slide.active{opacity:1;transform:translateX(0);pointer-events:auto}
.slide.prev{transform:translateX(-6%)}
.up{opacity:0;transform:translateY(16px);transition:opacity .5s ease,transform .5s ease}
.slide.active .up{opacity:1;transform:none}
.d1{transition-delay:.06s}.d2{transition-delay:.14s}.d3{transition-delay:.22s}
.d4{transition-delay:.30s}.d5{transition-delay:.38s}.d6{transition-delay:.46s}

.eyebrow{font-size:11.5px;letter-spacing:.34em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.premio-titulo{font-size:clamp(27px,7.6vw,44px);text-transform:uppercase;line-height:1;color:var(--oro);
  text-shadow:0 0 26px rgba(255,209,0,.35)}
.premio-nombre{font-size:clamp(46px,13vw,84px);line-height:.96;text-transform:uppercase;margin:10px 0 4px;
  background:linear-gradient(180deg,#fff 18%,var(--oro) 88%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 4px 0 rgba(0,0,0,.4)) drop-shadow(0 0 24px rgba(255,209,0,.35))}
.dato{display:inline-block;font-family:'Anton';font-size:clamp(24px,6.6vw,38px);color:var(--oro);
  margin-top:12px;padding:6px 20px;border-radius:999px;border:1px solid rgba(255,209,0,.45);
  background:rgba(255,209,0,.12)}
.desc{font-size:15.5px;color:var(--muted);max-width:344px;line-height:1.5;margin-top:14px}
.desc strong{color:var(--txt)}

/* ══ medalla firma ══ */
.medalla{width:126px;height:126px;border-radius:50%;position:relative;margin-bottom:20px;
  display:flex;align-items:center;justify-content:center;font-size:56px;
  background:radial-gradient(circle at 34% 28%, rgba(255,255,255,.30), transparent 52%), var(--panel2);
  border:2px solid var(--line);box-shadow:0 14px 40px rgba(0,0,0,.45)}
.medalla::before{content:'';position:absolute;inset:-8px;border-radius:50%;z-index:-1;
  background:conic-gradient(var(--oro), var(--azul), var(--rojo), var(--oro));
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 8px),#000 calc(100% - 7px));
          mask:radial-gradient(farthest-side,transparent calc(100% - 8px),#000 calc(100% - 7px))}
.medalla::after{content:'';position:absolute;inset:0;border-radius:50%;overflow:hidden;
  background:linear-gradient(115deg, transparent 42%, rgba(255,255,255,.35) 50%, transparent 58%);
  background-size:250% 100%;background-position:130% 0;animation:shine 3.6s ease-in-out infinite}
@keyframes shine{0%,55%{background-position:130% 0}85%,100%{background-position:-40% 0}}

/* ══ podio metálico ══ */
.podio{display:flex;align-items:flex-end;gap:10px;margin-top:24px}
.podio .col{display:flex;flex-direction:column;align-items:center;gap:8px}
.podio .caja{width:92px;border-radius:12px 12px 0 0;border:1px solid var(--line);border-bottom:none;
  display:flex;flex-direction:column;align-items:center;padding-top:12px;background:var(--panel)}
.podio .p1 .caja{height:138px;background:linear-gradient(180deg, rgba(255,209,0,.34), rgba(255,209,0,.05));
  border-color:rgba(255,209,0,.45)}
.podio .p2 .caja{height:100px;background:linear-gradient(180deg, rgba(199,206,224,.25), rgba(199,206,224,.04))}
.podio .p3 .caja{height:78px;background:linear-gradient(180deg, rgba(201,138,75,.28), rgba(201,138,75,.05))}
.podio .pos{font-family:'Anton';font-size:27px;color:var(--oro)}
.podio .p2 .pos{color:#C7CEE0}.podio .p3 .pos{color:#C98A4B}
.podio .pn{font-weight:800;font-size:14.5px;max-width:90px;line-height:1.12}
.podio .pp{font-size:12px;color:var(--muted)}
.podio .corona{font-size:24px;margin-bottom:-4px}

/* ══ placas y tarjetas ══ */
.placas{display:flex;flex-direction:column;gap:9px;margin-top:16px;width:min(364px,93vw)}
.placa{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:11px 14px;text-align:left;
  box-shadow:0 6px 18px rgba(0,0,0,.25)}
.placa .pn{font-weight:800;font-size:15px}
.placa .pd{font-size:13.5px;color:var(--muted);line-height:1.42;margin-top:2px}
.placa .pd strong,.placa .pn strong{color:var(--oro)}
.placa .tag{float:right;font-family:'Anton';font-size:15px;color:var(--oro)}
.chips{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:16px;width:min(364px,93vw)}
.chip{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:11px 10px}
.chip .cv{font-family:'Anton';font-size:22px;color:var(--oro)}
.chip .cl{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:3px;line-height:1.35}
.chip.wide{grid-column:1/-1}

/* ══ split hincha / traidor ══ */
.split{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px;width:min(364px,93vw)}
.half{border-radius:16px;padding:16px 10px 14px;border:1px solid var(--line)}
.half.love{background:linear-gradient(180deg, rgba(46,204,113,.16), var(--panel))}
.half.hate{background:linear-gradient(180deg, rgba(240,74,86,.16), var(--panel))}
.half .hicon{font-size:34px}
.half .htit{font-family:'Anton';font-size:19px;text-transform:uppercase;margin-top:6px;color:var(--oro)}
.half .hname{font-weight:800;font-size:16.5px;margin-top:6px;line-height:1.15}
.half .hdato{font-family:'Anton';font-size:26px;margin-top:4px}
.half.love .hdato{color:#2ECC71}.half.hate .hdato{color:#F04A56}
.half .hnote{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.35}

/* ══ campeones de la era ══ */
.eras{display:flex;flex-direction:column;gap:10px;margin-top:16px;width:min(364px,93vw)}
.era{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);
  border-radius:14px;padding:12px 14px;text-align:left}
.era.actual{background:linear-gradient(90deg, rgba(255,209,0,.12), var(--panel));border-color:rgba(255,209,0,.45)}
.era .eyear{font-family:'Anton';font-size:21px;color:var(--muted);min-width:52px}
.era.actual .eyear{color:var(--oro)}
.era .ename{font-weight:800;font-size:17.5px;flex:1}
.era .etor{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.era .ecopa{font-size:22px}

/* ══ tabla wrapped ══ */
.tabla{width:min(370px,94vw);margin-top:14px;display:flex;flex-direction:column;gap:5px}
.trow{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);
  border-radius:11px;padding:6px 11px;text-align:left}
.trow.t1{background:linear-gradient(90deg, rgba(255,209,0,.22), var(--panel));border-color:rgba(255,209,0,.45)}
.trow.t2{background:linear-gradient(90deg, rgba(199,206,224,.14), var(--panel))}
.trow.t3{background:linear-gradient(90deg, rgba(201,138,75,.16), var(--panel))}
.trow .tp{font-family:'Anton';font-size:15px;color:var(--oro);min-width:24px}
.trow.t2 .tp{color:#C7CEE0}.trow.t3 .tp{color:#C98A4B}
.trow .tn{font-weight:800;font-size:13.5px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trow .trail{font-family:'Barlow Condensed';font-size:12px;color:var(--muted);letter-spacing:.03em}
.trow .tpts{font-family:'Anton';font-size:14.5px;min-width:34px;text-align:right}
.tleyenda{font-size:11px;color:var(--muted);margin-top:8px;letter-spacing:.04em}

/* ══ gráficas ══ */
.grafica{margin-top:16px;width:min(364px,93vw)}
.grafica svg{width:100%;height:auto;display:block}
.legend{display:flex;gap:12px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.legend span{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.legend i{width:14px;height:3px;border-radius:2px;display:inline-block}

/* ══ portada / cierre ══ */
.logo-copa{font-size:78px;margin-bottom:8px;filter:drop-shadow(0 0 30px rgba(255,209,0,.35)) drop-shadow(0 8px 14px rgba(0,0,0,.4))}
.badge-preview{margin-top:16px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;
  border:1px solid var(--oro);color:var(--oro);border-radius:999px;padding:6px 14px}
.hint{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 16px);left:0;right:0;
  font-size:13px;color:var(--muted);animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* ══ navegación ══ */
#tapL,#tapR{position:fixed;top:0;bottom:0;z-index:30}
#tapL{left:0;width:34%}#tapR{right:0;width:66%}
.navArrow{position:fixed;top:50%;transform:translateY(-50%);z-index:35;width:38px;height:38px;border-radius:50%;
  border:1px solid var(--line);background:rgba(0,0,0,.3);color:var(--txt);font-size:16px;display:none;
  align-items:center;justify-content:center;cursor:pointer;user-select:none}
#arrL{left:10px}#arrR{right:10px}
@media(hover:hover) and (min-width:700px){.navArrow{display:flex}}

.confetti{position:absolute;top:-12px;width:9px;height:14px;opacity:.95;pointer-events:none;animation:caer linear forwards}
@keyframes caer{to{transform:translateY(110vh) rotate(720deg);opacity:.7}}

#loader{position:fixed;inset:0;display:flex;flex-direction:column;gap:14px;align-items:center;
  justify-content:center;background:var(--bg);z-index:100;transition:opacity .4s}
#loader.off{opacity:0;pointer-events:none}
.spinner{width:44px;height:44px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--oro);
  animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loader p{color:var(--muted);font-size:14px}
#loader button{margin-top:6px;background:var(--oro);color:#111;border:none;border-radius:999px;
  padding:10px 22px;font-weight:800;font-family:'Barlow';font-size:14px;display:none}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
  .up{opacity:1!important;transform:none!important}
}
</style>
</head>

<div class="navArrow" id="arrL">‹</div><div class="navArrow" id="arrR">›</div>
<div id="loader"><div class="spinner"></div><p id="loadmsg">Preparando la gala…</p><button id="retry" onclick="location.reload()">Reintentar</button></div>

/* ════════ UTILS ════════ */
function parseCSV(text){
  return text.trim().split('\n').map(row=>{
    const cells=[];let cur='',inQ=false;
    for(let i=0;i<row.length;i++){
      const c=row[i];
      if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){cells.push(cur.trim());cur='';}else cur+=c;
    }
    cells.push(cur.trim());return cells;
  });
}
function normalizeName(n){
  return (n||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim().replace(/\s+/g,' ');
}
const NORM_TO_CANON={};
PLAYERS.forEach(p=>NORM_TO_CANON[normalizeName(p)]=p);
function resolvePlayer(raw){
  const n=normalizeName(raw);
  return R32_ALIAS[n]||NOMBRE_ALIAS[n]||NORM_TO_CANON[n]||null;
}
function normTeam(t){return normalizeName(t);}
function teamES(t){return TEAM_MAP[t]||t;}
function sign(a,b){return a>b?1:(a<b?-1:0);}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function ordinal(n){return n+'°';}
function listar(arr){return arr.length<=1?(arr[0]||''):arr.slice(0,-1).join(', ')+' y '+arr[arr.length-1];}

/* ════════ PARSEO ════════ */
function parseClasificacion(csv){
  const rows=parseCSV(csv);
  const hIdx=rows.findIndex(r=>r.some(c=>c.includes('Participante')));
  if(hIdx<0)return null;
  const out=[];
  for(let i=hIdx+1;i<rows.length;i++){
    const r=rows[i];const raw=(r[1]||'').replace(/"/g,'').trim();if(!raw)continue;
    const name=resolvePlayer(raw)||raw;
    out.push({name,grp:parseInt(r[2])||0,oct:parseInt(r[3])||0,qf:parseInt(r[4])||0,
      sf:parseInt(r[5])||0,fin:parseInt(r[6])||0,camp:parseInt(r[7])||0,
      prem:parseInt(r[8])||0,total:parseInt(r[9])||0});
  }
  return out.length?out:null;
}
function parseResultados(csv){
  const rows=parseCSV(csv);
  const grpIdx=rows.findIndex(r=>r.some(c=>c==='Grp'||c==='Local'));
  const resultados={};
  if(grpIdx>=0)for(let i=grpIdx+1;i<rows.length;i++){
    const r=rows[i];const local=(r[1]||'').trim();const visita=(r[4]||'').trim();
    if(!local||!visita)continue;
    const gL=(r[2]||'').trim();const gV=(r[3]||'').trim();
    if(gL!==''&&gV!==''&&!isNaN(parseInt(gL)))resultados[`${local}|${visita}`]=[parseInt(gL),parseInt(gV)];
  }
  const clasificados={oct:[],cto:[],sf:[],fin:[],camp:[]};
  let fase=null;
  rows.forEach(r=>{
    const c0=(r[0]||'');
    if(c0.includes('OCTAVOS'))fase='oct';
    else if(c0.includes('CUARTOS'))fase='cto';
    else if(c0.includes('SEMIFINAL'))fase='sf';
    else if(c0.includes('CAMPEÓN'))fase='camp';
    else if(c0.includes('FINAL'))fase='fin';
    else if(fase&&(r[1]||'').startsWith('Equipo')){
      const team=(r[4]||'').trim();
      if(team)clasificados[fase].push(team);
    }
  });
  return {resultados,clasificados};
}
function parseCaptura(csv){
  const rows=parseCSV(csv);
  const hIdx=rows.findIndex(r=>r[0]==='Participante');
  if(hIdx<0)return null;
  const header=rows[hIdx];
  const COL_CAMP=header.indexOf('CAMPEÓN');
  const COL_BOTA=header.indexOf('Bota');
  const COL_BALON=header.indexOf('Balón');
  const COL_ARQ=header.indexOf('Arquero');
  const COL_NOV=header.indexOf('Novato');
  const COL_SF=[header.indexOf('SF1'),header.indexOf('SF2'),header.indexOf('SF3'),header.indexOf('SF4')];
  const COL_FIN=[header.indexOf('Fin1'),header.indexOf('Fin2')];
  const COL_OCT=[];for(let k=1;k<=16;k++)COL_OCT.push(header.indexOf('Oct'+k));
  const COL_CTO=[];for(let k=1;k<=8;k++)COL_CTO.push(header.indexOf('Cto'+k));
  const clean=v=>(v||'').replace(/[\t\r\n]+/g,' ').trim();
  const pronosticos=[],brackets={},premios={bota:{},balon:{},arquero:{},novato:{}};
  for(let i=hIdx+1;i<rows.length;i++){
    const r=rows[i];
    const name=resolvePlayer((r[0]||'').trim());
    if(!name)continue;
    const partidos=[];
    for(let j=0;j<72;j++){partidos.push([parseInt(r[1+j*2])||0,parseInt(r[2+j*2])||0]);}
    pronosticos.push({nombre:name,partidos});
    brackets[name]={
      oct:COL_OCT.map(c=>c>=0?clean(r[c]):'').filter(Boolean),
      cto:COL_CTO.map(c=>c>=0?clean(r[c]):'').filter(Boolean),
      sf:COL_SF.map(c=>c>=0?clean(r[c]):'').filter(Boolean),
      fin:COL_FIN.map(c=>c>=0?clean(r[c]):'').filter(Boolean),
      camp:COL_CAMP>=0?clean(r[COL_CAMP]):'',
    };
    if(COL_BOTA>=0&&clean(r[COL_BOTA]))premios.bota[name]=clean(r[COL_BOTA]);
    if(COL_BALON>=0&&clean(r[COL_BALON]))premios.balon[name]=clean(r[COL_BALON]);
    if(COL_ARQ>=0&&clean(r[COL_ARQ]))premios.arquero[name]=clean(r[COL_ARQ]);
    if(COL_NOV>=0&&clean(r[COL_NOV]))premios.novato[name]=clean(r[COL_NOV]);
  }
  return {pronosticos,brackets,premios};
}
function parseCapturaKO(csv){
  const rows=parseCSV(csv);
  if(!rows.length)return null;
  const header=rows[0];
  const col=n=>header.findIndex(h=>(h||'').trim().toLowerCase()===n.toLowerCase());
  const iName=col('Nombre'),iPart=col('Partido'),iL=col('Local'),iV=col('Visitante'),
        iGL=col('Goles L'),iGV=col('Goles V'),iPts=col('Puntos');
  if(iName<0||iPts<0)return null;
  const partidos={};
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    const name=resolvePlayer((r[iName]||'').trim());
    const part=(r[iPart]||'').trim();
    if(!name||!part)continue;
    if(!partidos[part])partidos[part]={local:(r[iL]||'').trim(),visita:(r[iV]||'').trim(),pronos:{},pts:{},calificado:false};
    const gl=(r[iGL]||'').trim(),gv=(r[iGV]||'').trim();
    if(gl!==''&&gv!==''&&!isNaN(parseInt(gl)))partidos[part].pronos[name]=[parseInt(gl),parseInt(gv)];
    const raw=(r[iPts]||'').replace(/[^0-9.\-]/g,'').trim();
    if(raw!==''&&!isNaN(parseFloat(raw))){
      partidos[part].pts[name]=(partidos[part].pts[name]||0)+parseFloat(raw);
      partidos[part].calificado=true;
    }
  }
  return partidos;
}

/* ════════ MOTOR ════════ */
const D={};
function rankOf(totalsMap){
  const arr=PLAYERS.map(n=>({n,p:totalsMap[n]||0})).sort((a,b)=>b.p-a.p);
  const rk={};let last=null,lastRank=0;
  arr.forEach((e,i)=>{
    if(e.p!==last){lastRank=i+1;last=e.p;}
    rk[e.n]=lastRank;
  });
  return rk;
}
function computeCheckpoints(){
  const cps=[];
  const grpOff={};D.clas.forEach(p=>grpOff[p.name]=p.grp);
  if(POOL==='mere'){
    const idxByKey={};FIXTURE_ORDER_CAPTURA.forEach(([l,v],i)=>idxByKey[`${l}|${v}`]=i);
    const run={};PLAYERS.forEach(n=>run[n]=0);
    let played=0;const jor=[24,48,72];let jNum=1;
    FIXTURE_ORDER.forEach(([l,v],chron)=>{
      const key=`${l}|${v}`;const real=D.res.resultados[key];const ci=idxByKey[key];
      if(real!==undefined&&ci!==undefined){
        const [rl,rv]=real;
        D.cap.pronosticos.forEach(pr=>{
          const p=pr.partidos[ci];if(!p)return;
          let pts=0;
          if(p[0]===rl&&p[1]===rv)pts=3;
          else if(sign(p[0],p[1])===sign(rl,rv))pts=2;
          run[pr.nombre]=(run[pr.nombre]||0)+pts;
        });
        played++;
      }
      if(chron+1===jor[jNum-1]&&played>0){cps.push({label:'J'+jNum,totals:{...run}});jNum++;}
    });
    if(cps.length)cps[cps.length-1]={label:'Grupos',totals:{...grpOff}};
    else cps.push({label:'Grupos',totals:{...grpOff}});
  }else{
    cps.push({label:'Grupos',totals:{...grpOff}});
  }
  const cum={...grpOff};
  const FASES=[['oct','Octavos'],['qf','Cuartos'],['sf','Semis'],['fin','Final']];
  FASES.forEach(([k,label])=>{
    if(!D.clas.some(p=>p[k]>0))return;
    D.clas.forEach(p=>{cum[p.name]=(cum[p.name]||0)+p[k];});
    cps.push({label,totals:{...cum}});
  });
  const tot={};D.clas.forEach(p=>tot[p.name]=p.total);
  cps.push({label:'Total',totals:tot});
  return cps.map(c=>({label:c.label,totals:c.totals,ranks:rankOf(c.totals)}));
}
function computeAwards(){
  const A={};
  const clasSorted=[...D.clas].sort((a,b)=>b.total-a.total);
  A.tabla=clasSorted;
  A.podio=clasSorted.slice(0,3);
  A.campeon=clasSorted[0];
  A.cuchara=clasSorted[clasSorted.length-1];
  A.finalizado=(D.res.clasificados.camp||[]).length>0;

  A.cps=computeCheckpoints();
  const finalRk=A.cps[A.cps.length-1].ranks;
  A.finalRk=finalRk;
  let rem=null,der=null;
  PLAYERS.forEach(n=>{
    let worst=-1,worstAt='',best=1e9,bestAt='';
    A.cps.slice(0,-1).forEach(c=>{
      if(c.ranks[n]>worst){worst=c.ranks[n];worstAt=c.label;}
      if(c.ranks[n]<best){best=c.ranks[n];bestAt=c.label;}
    });
    if(worst<0)return;
    const subida=worst-finalRk[n],caida=finalRk[n]-best;
    if(!rem||subida>rem.subida)rem={n,subida,desde:worst,desdeAt:worstAt,fin:finalRk[n]};
    if(!der||caida>der.caida)der={n,caida,desde:best,desdeAt:bestAt,fin:finalRk[n]};
  });
  A.remontada=rem;A.derrumbe=der;

  /* exactos + suertero + partido más clavado */
  const exactos={};PLAYERS.forEach(n=>exactos[n]=0);
  const solos={};PLAYERS.forEach(n=>solos[n]=[]);
  const idxByKey={};FIXTURE_ORDER_CAPTURA.forEach(([l,v],i)=>idxByKey[`${l}|${v}`]=i);
  let masExactosPartido=null;
  Object.entries(idxByKey).forEach(([key,ci])=>{
    const real=D.res.resultados[key];if(!real)return;
    const hitters=[];
    D.cap.pronosticos.forEach(pr=>{
      const p=pr.partidos[ci];
      if(p&&p[0]===real[0]&&p[1]===real[1]){exactos[pr.nombre]++;hitters.push(pr.nombre);}
    });
    const [l,v]=key.split('|');
    if(hitters.length===1)solos[hitters[0]].push(`${l} ${real[0]}-${real[1]} ${v}`);
    if(hitters.length>0&&(!masExactosPartido||hitters.length>masExactosPartido.cnt))
      masExactosPartido={cnt:hitters.length,txt:`${l} ${real[0]}-${real[1]} ${v}`};
  });
  Object.values(D.ko||{}).forEach(m=>{
    const real=D.res.resultados[`${m.local}|${m.visita}`];if(!real)return;
    Object.entries(m.pronos).forEach(([n,p])=>{
      if(p[0]===real[0]&&p[1]===real[1])exactos[n]=(exactos[n]||0)+1;
    });
  });
  const exArr=Object.entries(exactos).sort((a,b)=>b[1]-a[1]);
  A.profeta={n:exArr[0][0],exactos:exArr[0][1]};
  A.masExactosPartido=masExactosPartido;
  const soloArr=Object.entries(solos).map(([n,l])=>({n,cnt:l.length,lista:l})).sort((a,b)=>b.cnt-a.cnt);
  A.suertero=soloArr[0]&&soloArr[0].cnt>0?soloArr[0]:null;

  /* visionario */
  const fases=[['oct','oct',1],['cto','cto',2],['sf','sf',3],['fin','fin',4]];
  let vis=null;
  Object.entries(D.cap.brackets).forEach(([n,b])=>{
    let hits=0,peso=0;const det={};
    fases.forEach(([pk,rk,w])=>{
      const reales=(D.res.clasificados[rk]||[]).map(normTeam);
      const h=(b[pk]||[]).filter(t=>reales.includes(normTeam(t))).length;
      hits+=h;peso+=h*w;det[pk]=h;
    });
    const campReal=(D.res.clasificados.camp||[])[0];
    const campHit=campReal&&normTeam(b.camp)===normTeam(campReal);
    if(campHit){hits++;peso+=5;}
    const cand={n,hits,peso,det,campHit,campPick:b.camp};
    if(!vis||cand.hits>vis.hits||(cand.hits===vis.hits&&cand.peso>vis.peso))vis=cand;
  });
  A.visionario=vis;

  /* top videntes locos + el que nadie vio */
  const jugados=[...RESULTADOS_INESPERADOS].filter(m=>m.resultado!=='').sort((a,b)=>a.prob-b.prob);
  A.topVidentes=[];A.nadieLoVio=null;
  for(const cand of jugados){
    const L=teamES(cand.local),V=teamES(cand.visita);
    const ci=idxByKey[`${L}|${V}`];
    if(ci===undefined)continue;
    const [rl,rv]=cand.resultado.split('-').map(Number);
    const ex=[],rs=[];
    D.cap.pronosticos.forEach(pr=>{
      const p=pr.partidos[ci];if(!p)return;
      if(p[0]===rl&&p[1]===rv)ex.push({n:pr.nombre,pro:`${p[0]}-${p[1]}`});
      else if(sign(p[0],p[1])===sign(rl,rv))rs.push({n:pr.nombre,pro:`${p[0]}-${p[1]}`});
    });
    if(ex.length||rs.length){
      if(A.topVidentes.length<3)A.topVidentes.push({
        match:`${L} ${cand.resultado} ${V}`,prob:cand.prob,fuente:cand.fuente,
        exactos:ex,resultados:rs});
    }else if(!A.nadieLoVio){
      A.nadieLoVio={match:`${L} ${cand.resultado} ${V}`,prob:cand.prob,fuente:cand.fuente};
    }
    if(A.topVidentes.length>=3&&A.nadieLoVio)break;
  }

  /* gemelos: par con más pronósticos idénticos */
  let gem=null;
  const pros=D.cap.pronosticos;
  for(let i=0;i<pros.length;i++)for(let j=i+1;j<pros.length;j++){
    let ig=0;
    for(let k=0;k<72;k++){
      const a=pros[i].partidos[k],b=pros[j].partidos[k];
      if(a&&b&&a[0]===b[0]&&a[1]===b[1])ig++;
    }
    if(!gem||ig>gem.iguales)gem={a:pros[i].nombre,b:pros[j].nombre,iguales:ig};
  }
  A.gemelos=gem;

  /* hincha y traidor (goles pronosticados a HINCHA_TEAM en grupos) */
  const ecuIdx=[];
  FIXTURE_ORDER_CAPTURA.forEach(([l,v],i)=>{
    if(l===HINCHA_TEAM)ecuIdx.push([i,true]);
    else if(v===HINCHA_TEAM)ecuIdx.push([i,false]);
  });
  if(ecuIdx.length){
    const gf=pros.map(pr=>({n:pr.nombre,
      g:ecuIdx.reduce((s,[i,loc])=>s+(pr.partidos[i]?(loc?pr.partidos[i][0]:pr.partidos[i][1]):0),0)}));
    const maxG=Math.max(...gf.map(x=>x.g)),minG=Math.min(...gf.map(x=>x.g));
    A.hincha={ns:gf.filter(x=>x.g===maxG).map(x=>x.n),g:maxG};
    A.traidor={ns:gf.filter(x=>x.g===minG).map(x=>x.n),g:minG};
  }

  /* osado + goleador/amarrete */
  let osado=null;
  const golesTot=[];
  pros.forEach(pr=>{
    let tot=0;
    pr.partidos.forEach((p,i)=>{
      if(!p)return;tot+=p[0]+p[1];
      const g=p[0]+p[1];
      if(!osado||g>osado.g){
        const fix=FIXTURE_ORDER_CAPTURA[i];
        osado={n:pr.nombre,g,marcador:`${p[0]}-${p[1]}`,partido:fix?`${fix[0]} vs ${fix[1]}`:''};
      }
    });
    golesTot.push({n:pr.nombre,tot});
  });
  A.osado=osado;
  golesTot.sort((a,b)=>b.tot-a.tot);
  A.goleador=golesTot[0];A.amarrete=golesTot[golesTot.length-1];
  A.golesReales=Object.entries(idxByKey).reduce((s,[key])=>{
    const r=D.res.resultados[key];return s+(r?r[0]+r[1]:0);},0);

  /* duelo */
  let duelo=null;
  for(let i=0;i<clasSorted.length-1;i++){
    const gap=clasSorted[i].total-clasSorted[i+1].total;
    if(!duelo||gap<duelo.gap)duelo={a:clasSorted[i].name,b:clasSorted[i+1].name,gap,pos:i+1};
  }
  A.duelo=duelo;

  /* no la vio + premios acertados */
  A.noLaVio=[...GALA_CONFIG.noLaVio];
  A.premioStats=[];
  const catLabels={bota:'Bota de Oro',balon:'Balón de Oro',arquero:'Mejor Arquero',novato:'Mejor Novato'};
  Object.entries(GALA_CONFIG.premiosReales).forEach(([cat,real])=>{
    if(!real)return;
    const picks=D.cap.premios[cat]||{};
    const aciertan=Object.entries(picks).filter(([,v])=>normTeam(v)===normTeam(real)).map(([n])=>n);
    if(aciertan.length===0){
      A.noLaVio.push({nombre:catLabels[cat],pick:real,cat:catLabels[cat],
        nota:`Ganó ${real}… y no lo puso NADIE en la quiniela. Ni uno.`,auto:true});
    }else{
      A.premioStats.push({cat:catLabels[cat],real,aciertan});
    }
  });

  /* historial de la era */
  A.hist=null;
  if(HISTORIAL&&HISTORIAL.t1){
    const t1=HISTORIAL.t1,t2=HISTORIAL.t2;
    const camp1=Object.entries(t1.pos).sort((a,b)=>a[1]-b[1])[0][0];
    const camp2=t2?Object.entries(t2.pos).sort((a,b)=>a[1]-b[1])[0][0]:null;
    const last1=Object.entries(t1.pos).sort((a,b)=>b[1]-a[1])[0][0];
    const last2=t2?Object.entries(t2.pos).sort((a,b)=>b[1]-a[1])[0][0]:null;
    const trail=n=>[t1.pos[n]||null,t2?(t2.pos[n]||null):null,finalRk[n]||null];
    A.hist={t1,t2,camp1,camp2,last1,last2,trail,
      cucharaVeces:1+((last1===A.cuchara.name)?1:0)+((last2===A.cuchara.name)?1:0)};
  }

  A.totalPuntos=D.clas.reduce((s,p)=>s+p.total,0);
  return A;
}

/* ════════ SVG ════════ */
function svgTrayectoria(cps,destacado){
  const W=360,H=176,padL=16,padR=44,padT=14,padB=26;
  const n=cps.length;if(n<2)return '';
  const maxR=PLAYERS.length;
  const x=i=>padL+(W-padL-padR)*i/(n-1);
  const y=r=>padT+(H-padT-padB)*(r-1)/(maxR-1);
  let out=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  PLAYERS.forEach(p=>{
    if(p===destacado)return;
    const pts=cps.map((c,i)=>`${x(i)},${y(c.ranks[p])}`).join(' ');
    out+=`<polyline points="${pts}" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1.5"/>`;
  });
  const pts=cps.map((c,i)=>`${x(i)},${y(c.ranks[destacado])}`).join(' ');
  out+=`<polyline points="${pts}" fill="none" stroke="var(--oro)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  cps.forEach((c,i)=>{
    out+=`<circle cx="${x(i)}" cy="${y(c.ranks[destacado])}" r="4" fill="var(--oro)"/>`;
    out+=`<text x="${x(i)}" y="${H-8}" font-size="9.5" fill="var(--muted)" text-anchor="middle" font-family="Barlow">${esc(c.label)}</text>`;
  });
  out+=`<text x="${x(n-1)+8}" y="${y(cps[n-1].ranks[destacado])+4}" font-size="13" fill="var(--oro)" font-family="Anton">${cps[n-1].ranks[destacado]}°</text>`;
  return out+'</svg>';
}
function svgHistoriaFull(A){
  const H=A.hist;if(!H)return '';
  // Personas = unión de los 3 torneos (nombres ya canónicos en HISTORIAL)
  const gente=new Set([...Object.keys(H.t1.pos),...(H.t2?Object.keys(H.t2.pos):[]),...PLAYERS]);
  const tablaIdx={};A.tabla.forEach((p,i)=>tablaIdx[p.name]=i+1); // posición secuencial 2026
  const pers=[...gente].map(n=>({n,
    p1:H.t1.pos[n]||null,
    p2:H.t2?(H.t2.pos[n]||null):null,
    p3:tablaIdx[n]||null,
  }));
  const PAL=['#F2A93B','#33C481','#B06BE0','#4D96E8','#E8524F','#28B7A8','#E86BB1','#9CCB3B',
             '#F07E3E','#5F7BE8','#E8C13B','#48C7E8','#C46BE0','#7FD453','#E8646B','#F2E35B','#E88B53'];

  let out=`<svg viewBox="0 0 ${W} ${HT}" xmlns="http://www.w3.org/2000/svg">`;

  /* sellos de las competiciones */

  };

  /* líneas primero (debajo de los puntos) — ex-jugadores más tenues */

    if(p.p2!==null&&p.p3!==null)out+=`<line x1="${xM}" y1="${y(p.p2)}" x2="${xR}" y2="${y(p.p3)}" stroke="${c}" stroke-width="${w}" opacity="${op}"/>`;
    if(p.p1!==null&&p.p2===null&&p.p3!==null)out+=`<line x1="${xL}" y1="${y(p.p1)}" x2="${xR}" y2="${y(p.p3)}" stroke="${c}" stroke-width="1.6" opacity=".5" stroke-dasharray="4 4"/>`;
  });
  /* puntos + números + nombres */
  const dot=(x,r,c,op)=>{

      <text x="${x}" y="${y(r)+3.4}" font-size="9" font-weight="700" fill="#0B0F22" text-anchor="middle" font-family="Barlow">${r}</text>`;

      dot(xL,p.p1,c,dotOp);

    }
    if(p.p3!==null){
      dot(xR,p.p3,c,dotOp);
      out+=`<text x="${xR+15}" y="${y(p.p3)+3.5}" font-size="11" font-weight="600" fill="${c}" text-anchor="start" font-family="Barlow Condensed">${esc(p.n)}</text>`;

}

  }

  /* racha */
  if(A.racha)S.push(slidePremio({icon:'🔥',eyebrow:'Premio al que estaba encendido',titulo:'La Racha',
    nombre:A.racha.n,dato:`${A.racha.max} aciertos seguidos`,
    desc:`Encadenó <strong>${A.racha.max} resultados correctos al hilo</strong>. Hubo un momento del torneo en que simplemente no fallaba.`}));

  /* profeta */
  S.push(slidePremio({icon:'🔮',eyebrow:'Premio a la bola de cristal',titulo:'El Profeta',
    nombre:A.profeta.n,dato:`${A.profeta.exactos} marcadores exactos`,
    desc:`Nadie clavó más marcadores <strong>exactos</strong> en todo el mundial. Goles de local, goles de visita, todo.`}));

  /* suertero */
  if(A.suertero)S.push(slidePremio({icon:'🍀',eyebrow:'Premio a la fe en soledad',titulo:'El Suertero',
    nombre:A.suertero.n,dato:`${A.suertero.cnt} exacto${A.suertero.cnt>1?'s':''} que SOLO ${A.suertero.cnt>1?'él vio':'él vio'}`,
    desc:`Marcadores que clavó <strong>sin que nadie más del clan lo acompañara</strong>: ${A.suertero.lista.slice(0,3).map(x=>`<strong>${esc(x)}</strong>`).join(', ')}. Solo, contra el mundo.`}));

  /* videntes locos (top 3) */
  if(A.topVidentes.length){
    const placas=A.topVidentes.map((v,i)=>{
      const quien=v.exactos.length
        ?`<strong>${esc(listar(v.exactos.map(e=>e.n)))}</strong> lo clav${v.exactos.length>1?'aron':'ó'} EXACTO`
        :`<strong>${esc(v.resultados[0].n)}</strong> le atinó (puso ${esc(v.resultados[0].pro)})`;
      return `<div class="placa up d${Math.min(3+i,6)}"><span class="tag">${v.prob}%</span><div class="pn">${esc(v.match)}</div>
        <div class="pd">${quien}. Probabilidad según ${esc(v.fuente)}: <strong>${v.prob}%</strong>.</div></div>`;
    }).join('');
    S.push(`<div class="medalla up d1">🎰</div>
      <div class="eyebrow up d2">Los aciertos más improbables del torneo</div>
      <div class="premio-titulo display up d2">Videntes Locos</div>
      <div class="placas">${placas}</div>`);
  }

  /* visionario */
  if(A.visionario){
    const v=A.visionario;
    S.push(slidePremio({icon:'🧠',eyebrow:'Premio al bracket original',titulo:'El Visionario',
      nombre:v.n,dato:`${v.hits} aciertos desde el día 1`,
      desc:`De lo que llenó <strong>antes de que rodara el balón</strong>: ${v.det.oct}/16 dieciseisavos, ${v.det.cto}/8 cuartofinalistas, ${v.det.sf}/4 semifinalistas, ${v.det.fin}/2 finalistas${v.campHit?` y sí — <strong>el campeón (${esc(v.campPick)})</strong>`:''}. El que más lejos vio.`}));
  }

  /* gemelos */
  if(A.gemelos)S.push(slidePremio({icon:'👯',eyebrow:'Premio a la telepatía (o al plagio)',titulo:'Los Gemelos',
    nombre:`${A.gemelos.a} + ${A.gemelos.b}`,dato:`${A.gemelos.iguales} de 72 idénticos`,
    desc:`Pusieron <strong>exactamente el mismo marcador</strong> en ${A.gemelos.iguales} partidos de grupos. ¿Mentes conectadas o quiniela por interno? El clan juzgará.`}));

  /* hincha vs traidor */
  if(A.hincha){
    S.push(`<div class="medalla up d1">🇪🇨</div>
      <div class="eyebrow up d2">Con ${esc(HINCHA_APODO)} en el corazón (o no)</div>
      <div class="premio-titulo display up d2">Fe Tricolor</div>
      <div class="split">
        <div class="half love up d3"><div class="hicon">❤️</div><div class="htit">El Hincha</div>
          <div class="hname">${esc(listar(A.hincha.ns))}</div><div class="hdato display">${A.hincha.g} goles</div>
          <div class="hnote">le puso a ${esc(HINCHA_TEAM)} en sus pronósticos. Fe ciega.</div></div>
        <div class="half hate up d4"><div class="hicon">💔</div><div class="htit">El Traidor</div>
          <div class="hname">${esc(listar(A.traidor.ns))}</div><div class="hdato display">${A.traidor.g} goles</div>
          <div class="hnote">apenas. El que menos creyó en ${esc(HINCHA_APODO)}.</div></div>
      </div>
      <p class="desc up d5">Los pronósticos no mienten: aquí está quién soñó con ${esc(HINCHA_APODO)}… y quién la vendió antes de empezar.</p>`);
  }

  /* derrumbe */
  if(A.derrumbe&&A.derrumbe.caida>0)S.push(slidePremio({icon:'📉',eyebrow:'Premio a la ilusión rota',titulo:'El Derrumbe',
    nombre:A.derrumbe.n,dato:`−${A.derrumbe.caida} posiciones`,
    desc:`Llegó a estar <strong>${ordinal(A.derrumbe.desde)}</strong> tras ${esc(A.derrumbe.desdeAt)}… y terminó <strong>${ordinal(A.derrumbe.fin)}</strong>. Lo tuvimos, y lo dejamos ir.`}));

  /* cuchara */
  const cuchNota=H&&A.hist.cucharaVeces>1
    ?` Y ojo al dato: <strong>ya van ${A.hist.cucharaVeces===2?'dos':A.hist.cucharaVeces} torneos</strong> sosteniendo la tabla — bicampeón de la cuchara.`
    :' Alguien tenía que sostener la tabla desde abajo y lo hizo con honor.';
  S.push(slidePremio({icon:'🥄',eyebrow:'Premio con mucho cariño',titulo:'La Cuchara de Palo',
    nombre:A.cuchara.name,dato:`${A.cuchara.total} pts`,
    desc:`Último lugar, pero primero en corazón.${cuchNota}`}));

  /* no la vio */
  if(A.noLaVio.length){
    const placas=A.noLaVio.map((e,i)=>`<div class="placa up d${Math.min(3+i,6)}"><div class="pn">${esc(e.nombre)}</div>
      <div class="pd">${e.auto?'':`Puso <strong>${esc(e.pick)}</strong> como ${esc(e.cat)}. `}${esc(e.nota)}</div></div>`).join('');
    S.push(`<div class="medalla up d1">🙈</div>
      <div class="eyebrow up d2">Premio a la fe sin fundamento</div>
      <div class="premio-titulo display up d2">No la vio</div>
      <div class="placas">${placas}</div>`);
  }

  /* remontada */
  if(A.remontada&&A.remontada.subida>0)S.push(slidePremio({icon:'📈',eyebrow:'Premio a no rendirse nunca',titulo:'La Remontada',
    nombre:A.remontada.n,dato:`+${A.remontada.subida} posiciones`,
    desc:`Tras ${esc(A.remontada.desdeAt)} iba <strong>${ordinal(A.remontada.desde)}</strong>. Terminó <strong>${ordinal(A.remontada.fin)}</strong>. Remontada de libro.`,
    extra:`<div class="grafica">${svgTrayectoria(A.cps,A.remontada.n)}</div>`}));

  /* la historia: bump completo de la era, todos los participantes */
  if(H){
    S.push(`<div class="eyebrow up d1" style="margin-top:2px">Cuatro años de quiniela · todos</div>
      <div class="premio-titulo display up d1" style="font-size:clamp(23px,6.4vw,34px)">La Historia</div>
      <div class="grafica up d2" style="margin-top:8px">${svgHistoriaFull(A)}</div>
      <div class="tleyenda up d3" style="margin-top:6px">● líneas tenues = ya no juegan · punteada = se saltó un torneo</div>`);
  }

  /* datos curiosos (números del juego) */
  const chips=[];
  chips.push(`<div class="chip up d3"><div class="cv">${A.totalPuntos.toLocaleString('es')}</div><div class="cl">puntos repartidos</div></div>`);
  chips.push(`<div class="chip up d3"><div class="cv">${A.golesReales}</div><div class="cl">goles reales en grupos</div></div>`);
  if(A.goleador)chips.push(`<div class="chip wide up d4"><div class="cv">${esc(A.goleador.n)}: ${A.goleador.tot} goles</div><div class="cl">pronosticó más goles que nadie · ${esc(A.amarrete.n)} apenas ${A.amarrete.tot}, el amarrete</div></div>`);
  if(A.osado)chips.push(`<div class="chip wide up d4"><div class="cv">${esc(A.osado.marcador)}</div><div class="cl">el marcador más descarado: ${esc(A.osado.n)} en ${esc(A.osado.partido)}</div></div>`);
  if(A.duelo)chips.push(`<div class="chip wide up d5"><div class="cv">${A.duelo.gap===0?'Empate':A.duelo.gap+' pts'}</div><div class="cl">separaron a ${esc(A.duelo.a)} y ${esc(A.duelo.b)} (${ordinal(A.duelo.pos)} vs ${ordinal(A.duelo.pos+1)})</div></div>`);
  if(A.masExactosPartido)chips.push(`<div class="chip wide up d5"><div class="cv">${A.masExactosPartido.cnt} lo clavaron</div><div class="cl">${esc(A.masExactosPartido.txt)} · el más pronosticable</div></div>`);
  S.push(`<div class="medalla up d1" style="width:92px;height:92px;font-size:40px">📊</div>
    <div class="eyebrow up d2">Los números que dejó el mundial</div>
    <div class="premio-titulo display up d2">Datos Curiosos</div>
    <div class="chips">${chips.join('')}</div>`);

  /* puntería: premios individuales y rarezas */
  const chips2=[];
  if(A.nadieLoVio)chips2.push(`<div class="chip wide up d3"><div class="cv">0 personas</div><div class="cl">vieron venir el ${esc(A.nadieLoVio.match)} (${A.nadieLoVio.prob}% según ${esc(A.nadieLoVio.fuente)})</div></div>`);
  (A.premioStats||[]).forEach((ps,i)=>{
    const uno=ps.aciertan.length===1;
    chips2.push(`<div class="chip wide up d${Math.min(4+i,6)}"><div class="cv">${uno?esc(ps.aciertan[0]):ps.aciertan.length+' personas'}</div><div class="cl">le ${uno?'atinó':'atinaron'} a ${esc(ps.cat)} (${esc(ps.real)})${ps.aciertan.length>1&&ps.aciertan.length<=4?': '+esc(ps.aciertan.join(', ')):''}</div></div>`);
  });
  if(chips2.length)S.push(`<div class="medalla up d1" style="width:92px;height:92px;font-size:40px">🎯</div>
    <div class="eyebrow up d2">Quién le atinó a qué</div>
    <div class="premio-titulo display up d2">La Puntería</div>
    <div class="chips">${chips2.join('')}</div>`);

  /* podio */
  const [p1,p2,p3]=A.podio;
  S.push(`<div class="eyebrow up d1">El momento de la verdad</div>
    <div class="premio-titulo display up d1">El Podio</div>
    <div class="podio up d3">
      <div class="col p2"><div class="pn">${esc(p2?.name||'—')}</div><div class="caja"><div class="pos display">2°</div><div class="pp">${p2?.total??0} pts</div></div></div>
      <div class="col p1"><div class="corona">👑</div><div class="pn" style="font-size:16px">${previa?'?????':esc(p1?.name||'—')}</div><div class="caja"><div class="pos display">1°</div><div class="pp">${p1?.total??0} pts</div></div></div>
      <div class="col p3"><div class="pn">${esc(p3?.name||'—')}</div><div class="caja"><div class="pos display">3°</div><div class="pp">${p3?.total??0} pts</div></div></div>
    </div>
    <p class="desc up d5">${previa?'El primer lugar se revela cuando acabe el mundial… aunque ya se lo huelen.':'Un aplauso para el podio. Siguiente slide para coronar.'}</p>`);

  /* campeón */
  let arco='';
  if(H&&!previa){
    const tr=A.hist.trail(A.campeon.name);
    if(tr[0]||tr[1]){
      const partes=[];
      if(tr[0])partes.push(`${ordinal(tr[0])} en 2022`);
      if(tr[1])partes.push(`${ordinal(tr[1])} en la Copa América`);
      arco=` Venía de ser ${partes.join(' y ')} — <strong>la del 2026 fue la vencida</strong>.`;
    }
  }
  S.push(slidePremio({icon:'👑',eyebrow:previa?'Líder al día de hoy':'Campeón del mundo (de la quiniela)',
    titulo:previa?'El Líder':'El Campeón',nombre:A.campeon.name,dato:`${A.campeon.total} pts`,
    desc:previa?`Va arriba con <strong>${A.campeon.total} puntos</strong>. Falta lo que falta — nadie cante victoria.`
      :`<strong>${A.campeon.total} puntos</strong> de principio a fin.${arco} Que pase a recoger su premio (y a presumir hasta el 2030).`,
    extra:`<div class="grafica">${svgTrayectoria(A.cps,A.campeon.name)}</div>`}));

  /* tabla final wrapped */
  const filas=A.tabla.map((p,i)=>{
    const cls=i===0?'t1':i===1?'t2':i===2?'t3':'';
    const tr=H?A.hist.trail(p.name):null;
    return `<div class="trow ${cls} up d${Math.min(2+Math.floor(i/4),6)}">
      <div class="tp display">${i+1}</div>
      <div class="tn">${esc(p.name)}</div>
      ${tr?`<div class="trail">${trailTxt(tr)}</div>`:''}
      <div class="tpts display">${p.total}</div>
    </div>`;
  }).join('');
  S.push(`<div class="eyebrow up d1" style="margin-top:4px">Tu Mundial 2026, resumido</div>
    <div class="premio-titulo display up d1" style="font-size:clamp(24px,6.6vw,36px)">La Tabla Final</div>
    <div class="tabla">${filas}</div>
    ${H?'<div class="tleyenda up d6">posiciones: 2022 · 2024 · 2026</div>':''}`);

  /* cierre */
  S.push(`<div class="logo-copa up d1">🫡</div>
    <div class="eyebrow up d2">Fin de la ceremonia</div>
    <div class="premio-titulo display up d3" style="font-size:clamp(28px,8vw,46px)">${esc(GALA_CONFIG.fraseCierre)}</div>
    <p class="desc up d4">Gracias por pelear cada punto, por no abandonar el grupo y por creer${H?' — tres torneos y contando':''}. Nos vemos en 2030.</p>`);

  return S;
}

/* ════════ NAVEGACIÓN ════════ */
let cur=0,N=0,CAMP_IDX=-1;
function goTo(i){
  if(i<0||i>=N)return;
  cur=i;
  document.querySelectorAll('.slide').forEach((el,k)=>{
    el.classList.toggle('active',k===i);
    el.classList.toggle('prev',k<i);
  });
  document.querySelectorAll('#progress .seg').forEach((el,k)=>{
    el.classList.toggle('done',k<i);
    el.classList.toggle('active',k===i);
  });
  if(i===CAMP_IDX)lanzarConfetti();
}
function lanzarConfetti(){
  if(window._confettiDone||matchMedia('(prefers-reduced-motion: reduce)').matches)return;
  window._confettiDone=true;
  const colores=['#FFD100','#4D7FE3','#F04A56','#FFFFFF'];
  const host=document.querySelectorAll('.slide')[CAMP_IDX]||document.body;
  for(let i=0;i<80;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colores[i%colores.length];
    c.style.animationDuration=(2.4+Math.random()*2.2)+'s';
    c.style.animationDelay=(Math.random()*1.4)+'s';
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    host.appendChild(c);
    setTimeout(()=>c.remove(),6500);
  }
}
function initNav(){
  document.getElementById('tapR').addEventListener('click',()=>goTo(cur+1));
  document.getElementById('tapL').addEventListener('click',()=>goTo(cur-1));
  document.getElementById('arrR').addEventListener('click',()=>goTo(cur+1));
  document.getElementById('arrL').addEventListener('click',()=>goTo(cur-1));
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowRight'||e.key===' ')goTo(cur+1);
    if(e.key==='ArrowLeft')goTo(cur-1);
  });
  let x0=null;
  document.addEventListener('touchstart',e=>{x0=e.touches[0].clientX;},{passive:true});
  document.addEventListener('touchend',e=>{
    if(x0===null)return;
    const dx=e.changedTouches[0].clientX-x0;
    if(Math.abs(dx)>48)goTo(cur+(dx<0?1:-1));
    x0=null;
  },{passive:true});
}

/* ════════ ARRANQUE ════════ */
async function fetchCSV(url,intentos=3){
  for(let i=0;i<intentos;i++){
    try{
      const r=await fetch(url+'&t='+Date.now(),{cache:'no-store'});
      if(!r.ok)throw new Error('HTTP '+r.status);
      const t=await r.text();
      if(t&&t.length>80)return t;   // respuestas vacías/truncadas de Sheets se reintentan
      throw new Error('respuesta vacía');
    }catch(e){
      if(i===intentos-1)throw e;
      await new Promise(res=>setTimeout(res,700*(i+1)));
    }
  }
}
async function ini(){
  try{
    const [clas,res,cap,ko]=await Promise.all([
      fetchCSV(CSV_CLASIFICACION),fetchCSV(CSV_RESULTADOS),
      fetchCSV(CSV_CAPTURA),fetchCSV(CSV_CAPTURA_KO).catch(()=>''),
    ]);
    D.clas=parseClasificacion(clas);
    D.res=parseResultados(res);
    D.cap=parseCaptura(cap);
    D.ko=ko?parseCapturaKO(ko):{};
    if(!D.clas||!D.cap)throw new Error('CSV incompleto');
    // Sanidad: si la clasificación llegó en ceros (fetch parcial de Sheets), reintentar una vez
    if(D.clas.every(p=>p.total===0)){
      const clas2=await fetchCSV(CSV_CLASIFICACION);
      const re=parseClasificacion(clas2);
      if(re&&re.some(p=>p.total>0))D.clas=re;
    }

    /* racha (grupos cronológico + KO) */
    const idxByKey={};FIXTURE_ORDER_CAPTURA.forEach(([l,v],i)=>idxByKey[`${l}|${v}`]=i);
    const seq={};PLAYERS.forEach(n=>seq[n]=[]);
    FIXTURE_ORDER.forEach(([l,v])=>{
      const key=`${l}|${v}`;const real=D.res.resultados[key];const ci=idxByKey[key];
      if(!real||ci===undefined)return;
      D.cap.pronosticos.forEach(pr=>{
        const p=pr.partidos[ci];if(!p)return;
        seq[pr.nombre].push(sign(p[0],p[1])===sign(real[0],real[1]));
      });
    });
    KO_ROUNDS.forEach(r=>{
      Object.keys(D.ko||{}).filter(id=>id.startsWith(r.clave+'-')).sort().forEach(id=>{
        const m=D.ko[id];const real=D.res.resultados[`${m.local}|${m.visita}`];
        if(!real)return;
        Object.entries(m.pronos).forEach(([n,p])=>{
          if(seq[n])seq[n].push(sign(p[0],p[1])===sign(real[0],real[1]));
        });
      });
    });
    D.rachas=seq;

    const A=computeAwards();
    let racha=null;
    Object.entries(D.rachas).forEach(([n,s])=>{
      let c=0,max=0;
      s.forEach(hit=>{c=hit?c+1:0;if(c>max)max=c;});
      if(!racha||max>racha.max)racha={n,max};
    });
    A.racha=racha;

    const slides=buildSlides(A);
    N=slides.length;
    CAMP_IDX=N-3; // campeón va antes de tabla y cierre
    document.getElementById('slides').innerHTML=slides.map(s=>`<div class="slide">${s}</div>`).join('');
    document.getElementById('progress').innerHTML=slides.map(()=>'<div class="seg"><i></i></div>').join('');
    initNav();
    goTo(0);
    document.getElementById('loader').classList.add('off');
  }catch(err){
    console.error(err);
    document.getElementById('loadmsg').textContent='No se pudieron cargar los datos. Revisa tu conexión.';
    document.getElementById('retry').style.display='block';
  }
}
ini();
</script>
