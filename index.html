<style>
:root{
  --bg:#0B1026; --oro:#FFD100; --azul:#3B6FD1; --rojo:#EF3340;
  --txt:#F5F7FA; --muted:#97A0C4;
  --panel:rgba(255,255,255,.055); --line:rgba(255,255,255,.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
  font-family:'Barlow',system-ui,-apple-system,sans-serif;overscroll-behavior:none}
.display{font-family:'Anton',Impact,sans-serif;letter-spacing:.02em;font-weight:400}

/* ── escenario ── */
#stage{position:fixed;inset:0;background:
  radial-gradient(120% 70% at 50% -10%, rgba(59,111,209,.32) 0%, transparent 60%), var(--bg)}
#stage::after{content:'';position:absolute;inset:0;pointer-events:none;opacity:.5;
  background-image:radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px);
  background-size:26px 26px}

/* ── barra de progreso tipo stories ── */
#progress{position:fixed;top:calc(env(safe-area-inset-top,0px) + 10px);left:12px;right:12px;
  display:flex;gap:4px;z-index:40}
#progress .seg{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.22);overflow:hidden}
#progress .seg i{display:block;height:100%;width:0%;background:var(--oro);border-radius:2px;
  transition:width .25s ease}
#progress .seg.done i{width:100%}
#progress .seg.active i{width:100%}

/* ── slides ── */
.slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;padding:64px 22px 56px;
  opacity:0;transform:translateX(6%);pointer-events:none;
  transition:opacity .38s ease,transform .38s ease}
.slide.active{opacity:1;transform:translateX(0);pointer-events:auto}
.slide.prev{transform:translateX(-6%)}
.eyebrow{font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.premio-nombre{font-size:clamp(46px,13vw,86px);line-height:.95;text-transform:uppercase;
  margin:10px 0 6px;text-shadow:0 4px 0 rgba(0,0,0,.35)}
.premio-titulo{font-size:clamp(26px,7.5vw,44px);text-transform:uppercase;line-height:1;
  color:var(--oro)}
.desc{font-size:16px;color:var(--muted);max-width:340px;line-height:1.5;margin-top:12px}
.desc strong{color:var(--txt)}
.dato{font-family:'Anton';font-size:clamp(30px,9vw,52px);color:var(--oro);margin-top:6px}

/* ── medalla firma ── */
.medalla{width:118px;height:118px;border-radius:50%;position:relative;margin-bottom:22px;
  display:flex;align-items:center;justify-content:center;font-size:52px;
  background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.28), transparent 55%), var(--panel);
  border:2px solid var(--line)}
.medalla::before{content:'';position:absolute;inset:-7px;border-radius:50%;z-index:-1;
  background:conic-gradient(var(--oro), var(--azul), var(--rojo), var(--oro));
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 7px),#000 calc(100% - 6px));
          mask:radial-gradient(farthest-side,transparent calc(100% - 7px),#000 calc(100% - 6px))}
.medalla::after{content:'';position:absolute;inset:0;border-radius:50%;overflow:hidden;
  background:linear-gradient(115deg, transparent 42%, rgba(255,255,255,.34) 50%, transparent 58%);
  background-size:250% 100%;background-position:120% 0;animation:shine 3.4s ease-in-out infinite}
@keyframes shine{0%,55%{background-position:130% 0}85%,100%{background-position:-40% 0}}

/* ── podio ── */
.podio{display:flex;align-items:flex-end;gap:10px;margin-top:26px}
.podio .col{display:flex;flex-direction:column;align-items:center;gap:8px}
.podio .caja{width:88px;border-radius:10px 10px 0 0;background:var(--panel);
  border:1px solid var(--line);border-bottom:none;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;padding-top:10px}
.podio .p1 .caja{height:130px;background:linear-gradient(180deg, rgba(255,209,0,.16), var(--panel))}
.podio .p2 .caja{height:96px}.podio .p3 .caja{height:74px}
.podio .pos{font-family:'Anton';font-size:26px;color:var(--oro)}
.podio .pn{font-weight:800;font-size:14px;max-width:86px;line-height:1.1}
.podio .pp{font-size:12px;color:var(--muted)}

/* ── placas de la vergüenza / listas ── */
.placas{display:flex;flex-direction:column;gap:10px;margin-top:18px;width:min(360px,92vw)}
.placa{background:var(--panel);border:1px solid var(--line);border-radius:12px;
  padding:12px 14px;text-align:left}
.placa .pn{font-weight:800;font-size:15px}
.placa .pd{font-size:13.5px;color:var(--muted);line-height:1.4;margin-top:2px}
.placa .pd strong{color:var(--oro)}
.chips{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px;width:min(360px,92vw)}
.chip{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 10px}
.chip .cv{font-family:'Anton';font-size:24px;color:var(--oro)}
.chip .cl{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.chip.wide{grid-column:1/-1}

/* ── gráficas SVG ── */
.grafica{margin-top:18px;width:min(360px,92vw)}
.grafica svg{width:100%;height:auto;display:block}

/* ── portada / cierre ── */
.logo-copa{font-size:74px;margin-bottom:10px;filter:drop-shadow(0 6px 12px rgba(0,0,0,.4))}
.badge-preview{margin-top:16px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;
  border:1px solid var(--oro);color:var(--oro);border-radius:999px;padding:6px 14px}
.hint{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 18px);left:0;right:0;
  font-size:13px;color:var(--muted);animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}

/* ── navegación ── */
#tapL,#tapR{position:fixed;top:0;bottom:0;z-index:30}
#tapL{left:0;width:34%}#tapR{right:0;width:66%}
.navArrow{position:fixed;top:50%;transform:translateY(-50%);z-index:35;width:38px;height:38px;
  border-radius:50%;border:1px solid var(--line);background:rgba(0,0,0,.3);color:var(--txt);
  font-size:16px;display:none;align-items:center;justify-content:center;cursor:pointer;user-select:none}
#arrL{left:10px}#arrR{right:10px}
@media(hover:hover) and (min-width:700px){.navArrow{display:flex}}

/* ── confetti ── */
.confetti{position:absolute;top:-12px;width:9px;height:14px;opacity:.95;pointer-events:none;
  animation:caer linear forwards}
@keyframes caer{to{transform:translateY(110vh) rotate(720deg);opacity:.7}}

/* ── loader ── */
#loader{position:fixed;inset:0;display:flex;flex-direction:column;gap:14px;align-items:center;
  justify-content:center;background:var(--bg);z-index:100;transition:opacity .4s}
#loader.off{opacity:0;pointer-events:none}
.spinner{width:44px;height:44px;border-radius:50%;border:3px solid var(--line);
  border-top-color:var(--oro);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loader p{color:var(--muted);font-size:14px}
#loader button{margin-top:6px;background:var(--oro);color:#111;border:none;border-radius:999px;
  padding:10px 22px;font-weight:800;font-family:'Barlow';font-size:14px;display:none}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}
</style>
</head>

/* ════════ UTILS ════════ */
function parseCSV(text){
  return text.trim().split('\n').map(row=>{
    const cells=[];let cur='',inQ=false;
    for(let i=0;i<row.length;i++){
      const c=row[i];
      if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){cells.push(cur.trim());cur='';}else cur+=c;
    }
    cells.push(cur.trim());return cells;
  });
}
function normalizeName(n){
  return (n||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim().replace(/\s+/g,' ');
}
const NORM_TO_CANON={};
PLAYERS.forEach(p=>NORM_TO_CANON[normalizeName(p)]=p);
function resolvePlayer(raw){
  const n=normalizeName(raw);
  return R32_ALIAS[n]||NOMBRE_ALIAS[n]||NORM_TO_CANON[n]||null;
}
function normTeam(t){return normalizeName(t);}
function teamES(t){return TEAM_MAP[t]||t;}
function sign(a,b){return a>b?1:(a<b?-1:0);}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function ordinal(n){return n+'°';}

/* ════════ PARSEO (mismo contrato que el dashboard) ════════ */
function parseClasificacion(csv){
  const rows=parseCSV(csv);
  const hIdx=rows.findIndex(r=>r.some(c=>c.includes('Participante')));
  if(hIdx<0)return null;
  const out=[];
  for(let i=hIdx+1;i<rows.length;i++){
    const r=rows[i];const raw=(r[1]||'').replace(/"/g,'').trim();if(!raw)continue;
    const name=resolvePlayer(raw)||raw;
    out.push({name,grp:parseInt(r[2])||0,oct:parseInt(r[3])||0,qf:parseInt(r[4])||0,
      sf:parseInt(r[5])||0,fin:parseInt(r[6])||0,camp:parseInt(r[7])||0,
      prem:parseInt(r[8])||0,total:parseInt(r[9])||0});
  }
  return out.length?out:null;
}
function parseResultados(csv){
  const rows=parseCSV(csv);
  const grpIdx=rows.findIndex(r=>r.some(c=>c==='Grp'||c==='Local'));
  const resultados={};
  if(grpIdx>=0)for(let i=grpIdx+1;i<rows.length;i++){
    const r=rows[i];const local=(r[1]||'').trim();const visita=(r[4]||'').trim();
    if(!local||!visita)continue;
    const gL=(r[2]||'').trim();const gV=(r[3]||'').trim();
    if(gL!==''&&gV!==''&&!isNaN(parseInt(gL)))resultados[`${local}|${visita}`]=[parseInt(gL),parseInt(gV)];
  }
  const clasificados={oct:[],cto:[],sf:[],fin:[],camp:[]};
  let fase=null;
  rows.forEach(r=>{
    const c0=(r[0]||'');
    if(c0.includes('OCTAVOS'))fase='oct';
    else if(c0.includes('CUARTOS'))fase='cto';
    else if(c0.includes('SEMIFINAL'))fase='sf';
    else if(c0.includes('CAMPEÓN'))fase='camp';
    else if(c0.includes('FINAL'))fase='fin';
    else if(fase&&(r[1]||'').startsWith('Equipo')){
      const team=(r[4]||'').trim();
      if(team)clasificados[fase].push(team);
    }
  });
  return {resultados,clasificados};
}
function parseCaptura(csv){
  const rows=parseCSV(csv);
  const hIdx=rows.findIndex(r=>r[0]==='Participante');
  if(hIdx<0)return null;
  const header=rows[hIdx];
  const COL_CAMP=header.indexOf('CAMPEÓN');
  const COL_BOTA=header.indexOf('Bota');
  const COL_BALON=header.indexOf('Balón');
  const COL_ARQ=header.indexOf('Arquero');
  const COL_NOV=header.indexOf('Novato');
  const COL_SF=[header.indexOf('SF1'),header.indexOf('SF2'),header.indexOf('SF3'),header.indexOf('SF4')];
  const COL_FIN=[header.indexOf('Fin1'),header.indexOf('Fin2')];
  const COL_OCT=[];for(let k=1;k<=16;k++)COL_OCT.push(header.indexOf('Oct'+k));
  const COL_CTO=[];for(let k=1;k<=8;k++)COL_CTO.push(header.indexOf('Cto'+k));
  const clean=v=>(v||'').replace(/[\t\r\n]+/g,' ').trim();
  const pronosticos=[],brackets={},premios={bota:{},balon:{},arquero:{},novato:{}};
  for(let i=hIdx+1;i<rows.length;i++){
    const r=rows[i];
    const name=resolvePlayer((r[0]||'').trim());
    if(!name)continue;
    const partidos=[];
    for(let j=0;j<72;j++){partidos.push([parseInt(r[1+j*2])||0,parseInt(r[2+j*2])||0]);}
    pronosticos.push({nombre:name,partidos});
    brackets[name]={
      oct:COL_OCT.map(c=>c>=0?clean(r[c]):'').filter(Boolean),
      cto:COL_CTO.map(c=>c>=0?clean(r[c]):'').filter(Boolean),
      sf:COL_SF.map(c=>c>=0?clean(r[c]):'').filter(Boolean),
      fin:COL_FIN.map(c=>c>=0?clean(r[c]):'').filter(Boolean),
      camp:COL_CAMP>=0?clean(r[COL_CAMP]):'',
    };
    if(COL_BOTA>=0&&clean(r[COL_BOTA]))premios.bota[name]=clean(r[COL_BOTA]);
    if(COL_BALON>=0&&clean(r[COL_BALON]))premios.balon[name]=clean(r[COL_BALON]);
    if(COL_ARQ>=0&&clean(r[COL_ARQ]))premios.arquero[name]=clean(r[COL_ARQ]);
    if(COL_NOV>=0&&clean(r[COL_NOV]))premios.novato[name]=clean(r[COL_NOV]);
  }
  return {pronosticos,brackets,premios};
}
function parseCapturaKO(csv){
  const rows=parseCSV(csv);
  if(!rows.length)return null;
  const header=rows[0];
  const col=n=>header.findIndex(h=>(h||'').trim().toLowerCase()===n.toLowerCase());
  const iName=col('Nombre'),iPart=col('Partido'),iL=col('Local'),iV=col('Visitante'),
        iGL=col('Goles L'),iGV=col('Goles V'),iPts=col('Puntos');
  if(iName<0||iPts<0)return null;
  // filas: por partido → {equipos, pronos por persona, puntos por persona}
  const partidos={}; // 'R32-01' -> {local,visita,pronos:{name:[l,v]},pts:{name:n},calificado}
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    const name=resolvePlayer((r[iName]||'').trim());
    const part=(r[iPart]||'').trim();
    if(!name||!part)continue;
    if(!partidos[part])partidos[part]={local:(r[iL]||'').trim(),visita:(r[iV]||'').trim(),pronos:{},pts:{},calificado:false};
    const gl=(r[iGL]||'').trim(),gv=(r[iGV]||'').trim();
    if(gl!==''&&gv!==''&&!isNaN(parseInt(gl)))partidos[part].pronos[name]=[parseInt(gl),parseInt(gv)];
    const raw=(r[iPts]||'').replace(/[^0-9.\-]/g,'').trim();
    if(raw!==''&&!isNaN(parseFloat(raw))){
      partidos[part].pts[name]=(partidos[part].pts[name]||0)+parseFloat(raw);
      partidos[part].calificado=true;
    }
  }
  return partidos;
}

/* ════════ MOTOR DE PREMIOS ════════ */
const D={}; // datos crudos parseados
function rankOf(totalsMap){
  // ranking competition-style a partir de {name: puntos}
  const arr=PLAYERS.map(n=>({n,p:totalsMap[n]||0})).sort((a,b)=>b.p-a.p);
  const rk={};let last=null,lastRank=0;
  arr.forEach((e,i)=>{
    if(e.p!==last){lastRank=i+1;last=e.p;}
    rk[e.n]=lastRank;
  });
  return rk;
}
function computeCheckpoints(){
  // Trayectoria de ranking con checkpoints 100% oficiales
  // (para MERE se agregan J1/J2/J3 con replay validado contra la hoja).
  const cps=[]; // {label, totals:{name:pts}}
  const grpOff={};D.clas.forEach(p=>grpOff[p.name]=p.grp);

  if(POOL==='mere'){
    // replay por jornada: FIXTURE_ORDER es cronológico; 24 partidos por jornada
    const idxByKey={};FIXTURE_ORDER_CAPTURA.forEach(([l,v],i)=>idxByKey[`${l}|${v}`]=i);
    const run={};PLAYERS.forEach(n=>run[n]=0);
    let played=0;
    const jor=[24,48,72];let jNum=1;
    FIXTURE_ORDER.forEach(([l,v],chron)=>{
      const key=`${l}|${v}`;const real=D.res.resultados[key];const ci=idxByKey[key];
      if(real!==undefined&&ci!==undefined){
        const [rl,rv]=real;
        D.cap.pronosticos.forEach(pr=>{
          const p=pr.partidos[ci];if(!p)return;
          let pts=0;
          if(p[0]===rl&&p[1]===rv)pts=3;
          else if(sign(p[0],p[1])===sign(rl,rv))pts=2;
          run[pr.nombre]=(run[pr.nombre]||0)+pts;
        });
        played++;
      }
      if(chron+1===jor[jNum-1]&&played>0){
        cps.push({label:'J'+jNum,totals:{...run}});jNum++;
      }
    });
    // ancla al oficial de grupos por si hubiese ajuste manual
    if(cps.length)cps[cps.length-1]={label:'Grupos',totals:{...grpOff}};
    else cps.push({label:'Grupos',totals:{...grpOff}});
  }else{
    cps.push({label:'Grupos',totals:{...grpOff}});
  }

  // eliminatorias: columnas OFICIALES de CLASIFICACION, acumuladas fase a fase
  const cum={...grpOff};
  const FASES=[['oct','Octavos'],['qf','Cuartos'],['sf','Semis'],['fin','Final']];
  FASES.forEach(([k,label])=>{
    if(!D.clas.some(p=>p[k]>0))return; // fase aún sin puntos = no jugada
    D.clas.forEach(p=>{cum[p.name]=(cum[p.name]||0)+p[k];});
    cps.push({label,totals:{...cum}});
  });
  // cierre = TOTAL oficial (incluye campeón + premios individuales)
  const tot={};D.clas.forEach(p=>tot[p.name]=p.total);
  cps.push({label:'Total',totals:tot});
  return cps.map(c=>({label:c.label,totals:c.totals,ranks:rankOf(c.totals)}));
}
function computeAwards(){
  const A={};
  const clasSorted=[...D.clas].sort((a,b)=>b.total-a.total);
  A.podio=clasSorted.slice(0,3);
  A.campeon=clasSorted[0];
  A.cuchara=clasSorted[clasSorted.length-1];
  A.finalizado=(D.res.clasificados.camp||[]).length>0;

  /* checkpoints + remontada/derrumbe */
  A.cps=computeCheckpoints();
  const finalRk=A.cps[A.cps.length-1].ranks;
  let rem=null,der=null;
  PLAYERS.forEach(n=>{
    let worst=-1,worstAt='',best=1e9,bestAt='';
    A.cps.slice(0,-1).forEach(c=>{
      if(c.ranks[n]>worst){worst=c.ranks[n];worstAt=c.label;}
      if(c.ranks[n]<best){best=c.ranks[n];bestAt=c.label;}
    });
    if(worst<0)return;
    const subida=worst-finalRk[n], caida=finalRk[n]-best;
    if(!rem||subida>rem.subida)rem={n,subida,desde:worst,desdeAt:worstAt,fin:finalRk[n]};
    if(!der||caida>der.caida)der={n,caida,desde:best,desdeAt:bestAt,fin:finalRk[n]};
  });
  A.remontada=rem;A.derrumbe=der;

  /* profeta: exactos en grupos + eliminatorias */
  const exactos={};PLAYERS.forEach(n=>exactos[n]=0);
  const idxByKey={};FIXTURE_ORDER_CAPTURA.forEach(([l,v],i)=>idxByKey[`${l}|${v}`]=i);
  let masExactosPartido=null;
  Object.entries(idxByKey).forEach(([key,ci])=>{
    const real=D.res.resultados[key];if(!real)return;
    let cnt=0;
    D.cap.pronosticos.forEach(pr=>{
      const p=pr.partidos[ci];
      if(p&&p[0]===real[0]&&p[1]===real[1]){exactos[pr.nombre]++;cnt++;}
    });
    if(cnt>0&&(!masExactosPartido||cnt>masExactosPartido.cnt)){
      const [l,v]=key.split('|');
      masExactosPartido={cnt,txt:`${l} ${real[0]}-${real[1]} ${v}`};
    }
  });
  Object.values(D.ko||{}).forEach(m=>{
    const real=D.res.resultados[`${m.local}|${m.visita}`];if(!real)return;
    Object.entries(m.pronos).forEach(([n,p])=>{
      if(p[0]===real[0]&&p[1]===real[1])exactos[n]=(exactos[n]||0)+1;
    });
  });
  const exArr=Object.entries(exactos).sort((a,b)=>b[1]-a[1]);
  A.profeta={n:exArr[0][0],exactos:exArr[0][1]};
  A.masExactosPartido=masExactosPartido;

  /* visionario: bracket original vs clasificados reales */
  const fases=[['oct','oct',1],['cto','cto',2],['sf','sf',3],['fin','fin',4]];
  let vis=null;
  Object.entries(D.cap.brackets).forEach(([n,b])=>{
    let hits=0,peso=0;const det={};
    fases.forEach(([pk,rk,w])=>{
      const reales=(D.res.clasificados[rk]||[]).map(normTeam);
      const h=(b[pk]||[]).filter(t=>reales.includes(normTeam(t))).length;
      hits+=h;peso+=h*w;det[pk]=h;
    });
    const campReal=(D.res.clasificados.camp||[])[0];
    const campHit=campReal&&normTeam(b.camp)===normTeam(campReal);
    if(campHit){hits++;peso+=5;}
    const cand={n,hits,peso,det,campHit,campPick:b.camp};
    if(!vis||cand.hits>vis.hits||(cand.hits===vis.hits&&cand.peso>vis.peso))vis=cand;
  });
  A.visionario=vis;

  /* vidente loco: acierto más improbable + el que nadie vio */
  const jugados=[...RESULTADOS_INESPERADOS].filter(m=>m.resultado!=='').sort((a,b)=>a.prob-b.prob);
  A.vidente=null;A.nadieLoVio=null;
  for(const cand of jugados){
    const L=teamES(cand.local),V=teamES(cand.visita);
    const ci=idxByKey[`${L}|${V}`];
    if(ci===undefined)continue;
    const [rl,rv]=cand.resultado.split('-').map(Number);
    let exactoHit=null,resultHit=null;
    D.cap.pronosticos.forEach(pr=>{
      const p=pr.partidos[ci];if(!p)return;
      if(p[0]===rl&&p[1]===rv&&!exactoHit)exactoHit={n:pr.nombre,pro:`${p[0]}-${p[1]}`};
      else if(sign(p[0],p[1])===sign(rl,rv)&&!resultHit)resultHit={n:pr.nombre,pro:`${p[0]}-${p[1]}`};
    });
    const hit=exactoHit||resultHit;
    if(hit&&!A.vidente){
      A.vidente={n:hit.n,pro:hit.pro,exacto:!!exactoHit,match:`${L} vs ${V}`,
        resultado:cand.resultado,prob:cand.prob,fuente:cand.fuente};
    }
    if(!hit&&!A.nadieLoVio){
      A.nadieLoVio={match:`${L} ${cand.resultado} ${V}`,prob:cand.prob,fuente:cand.fuente};
    }
    if(A.vidente&&A.nadieLoVio)break;
  }

  /* racha máxima (grupos cronológico + KO por ronda) */
  const seq={};PLAYERS.forEach(n=>seq[n]=[]);
  FIXTURE_ORDER.forEach(([l,v])=>{
    const key=`${l}|${v}`;const real=D.res.resultados[key];const ci=idxByKey[key];
    if(!real||ci===undefined)return;
    D.cap.pronosticos.forEach(pr=>{
      const p=pr.partidos[ci];if(!p)return;
      seq[pr.nombre].push(sign(p[0],p[1])===sign(real[0],real[1]));
    });
  });
  KO_ROUNDS.forEach(r=>{
    const ids=Object.keys(D.ko||{}).filter(id=>id.startsWith(r.clave+'-')).sort();
    ids.forEach(id=>{
      const m=D.ko[id];const real=D.res.resultados[`${m.local}|${m.visita}`];
      if(!real)return;
      Object.entries(m.pronos).forEach(([n,p])=>{
        if(seq[n])seq[n].push(sign(p[0],p[1])===sign(real[0],real[1]));
      });
    });
  });
  let racha=null;
  Object.entries(seq).forEach(([n,s])=>{
    let cur=0,max=0;
    s.forEach(hit=>{cur=hit?cur+1:0;if(cur>max)max=cur;});
    if(!racha||max>racha.max)racha={n,max};
  });
  A.racha=racha;

  /* duelo: margen final más cerrado entre vecinos de tabla */
  let duelo=null;
  for(let i=0;i<clasSorted.length-1;i++){
    const gap=clasSorted[i].total-clasSorted[i+1].total;
    if(!duelo||gap<duelo.gap)duelo={a:clasSorted[i].name,b:clasSorted[i+1].name,gap,pos:i+1};
  }
  A.duelo=duelo;

  /* no la vio: manual + auto (si premiosReales están llenos) */
  A.noLaVio=[...GALA_CONFIG.noLaVio];
  A.premioStats=[];
  const catLabels={bota:'Bota de Oro',balon:'Balón de Oro',arquero:'Mejor Arquero',novato:'Mejor Novato'};
  Object.entries(GALA_CONFIG.premiosReales).forEach(([cat,real])=>{
    if(!real)return;
    const picks=D.cap.premios[cat]||{};
    const aciertan=Object.entries(picks).filter(([,v])=>normTeam(v)===normTeam(real)).map(([n])=>n);
    if(aciertan.length===0){
      A.noLaVio.push({nombre:catLabels[cat],pick:real,cat:catLabels[cat],
        nota:`Ganó ${real}… y no lo puso NADIE en la quiniela. Ni uno.`,auto:true});
    }else{
      A.premioStats.push({cat:catLabels[cat],real,aciertan});
    }
  });

  /* datos curiosos */
  A.totalPuntos=D.clas.reduce((s,p)=>s+p.total,0);
  A.promedio=Math.round(A.totalPuntos/D.clas.length);
  return A;
}

/* ════════ GRÁFICAS SVG ════════ */
function svgTrayectoria(cps,destacado){
  const W=360,H=180,padL=16,padR=44,padT=14,padB=26;
  const n=cps.length;if(n<2)return '';
  const maxR=PLAYERS.length;
  const x=i=>padL+(W-padL-padR)*i/(n-1);
  const y=r=>padT+(H-padT-padB)*(r-1)/(maxR-1);
  let out=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  PLAYERS.forEach(p=>{
    if(p===destacado)return;
    const pts=cps.map((c,i)=>`${x(i)},${y(c.ranks[p])}`).join(' ');
    out+=`<polyline points="${pts}" fill="none" stroke="rgba(255,255,255,.13)" stroke-width="1.5"/>`;
  });
  const pts=cps.map((c,i)=>`${x(i)},${y(c.ranks[destacado])}`).join(' ');
  out+=`<polyline points="${pts}" fill="none" stroke="var(--oro)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  cps.forEach((c,i)=>{
    out+=`<circle cx="${x(i)}" cy="${y(c.ranks[destacado])}" r="4" fill="var(--oro)"/>`;
    out+=`<text x="${x(i)}" y="${H-8}" font-size="9.5" fill="var(--muted)" text-anchor="middle" font-family="Barlow">${esc(c.label)}</text>`;
  });
  const last=cps[n-1];
  out+=`<text x="${x(n-1)+8}" y="${y(last.ranks[destacado])+4}" font-size="13" fill="var(--oro)" font-family="Anton">${last.ranks[destacado]}°</text>`;
  out+='</svg>';
  return out;
}

/* ════════ SLIDES ════════ */
function slidePremio({icon,eyebrow,titulo,nombre,dato,desc,extra=''}){
  return `<div class="medalla">${icon}</div>
    <div class="eyebrow">${esc(eyebrow)}</div>
    <div class="premio-titulo display">${esc(titulo)}</div>
    <div class="premio-nombre display">${esc(nombre)}</div>
    ${dato?`<div class="dato">${dato}</div>`:''}
    ${desc?`<p class="desc">${desc}</p>`:''}
    ${extra}`;
}
function buildSlides(A){
  const S=[];
  const previa=!A.finalizado;

  S.push(`<div class="logo-copa">🏆</div>
    <div class="eyebrow">Mundial 2026 · La ceremonia</div>
    <div class="premio-titulo display" style="font-size:clamp(34px,10vw,58px)">La Gala</div>
    <div class="premio-nombre display" style="font-size:clamp(30px,8.5vw,52px)">${esc(NOMBRE_QUINIELA)}</div>
    <p class="desc">Los premios, las glorias y las vergüenzas de este mundial. Con datos, para que nadie alegue.</p>
    ${previa?'<div class="badge-preview">Vista previa · el mundial sigue</div>':''}
    <div class="hint">Toca o desliza para avanzar →</div>`);

  if(A.racha)S.push(slidePremio({icon:'🔥',eyebrow:'Premio al que estaba encendido',titulo:'La Racha',
    nombre:A.racha.n,dato:`${A.racha.max} aciertos seguidos`,
    desc:`Encadenó <strong>${A.racha.max} resultados correctos al hilo</strong>. Hubo un momento del torneo en que simplemente no fallaba.`}));

  S.push(slidePremio({icon:'🔮',eyebrow:'Premio a la bola de cristal',titulo:'El Profeta',
    nombre:A.profeta.n,dato:`${A.profeta.exactos} marcadores exactos`,
    desc:`Nadie clavó más marcadores <strong>exactos</strong> en todo el mundial. Goles de local, goles de visita, todo.`}));

  if(A.vidente)S.push(slidePremio({icon:'🎰',eyebrow:'Premio al acierto imposible',titulo:'El Vidente Loco',
    nombre:A.vidente.n,dato:`${A.vidente.prob}% de probabilidad`,
    desc:`${A.vidente.exacto?'Clavó exacto':'Le atinó a'} el <strong>${esc(A.vidente.match)}: ${esc(A.vidente.resultado)}</strong> — un resultado al que el mercado (${esc(A.vidente.fuente)}) le daba apenas <strong>${A.vidente.prob}%</strong>. ${A.vidente.exacto?'':`Puso ${esc(A.vidente.pro)}.`}`}));

  if(A.visionario){
    const v=A.visionario;
    const linea=[`${v.det.oct}/16 dieciseisavos`,`${v.det.cto}/8 cuartofinalistas`,`${v.det.sf}/4 semifinalistas`,`${v.det.fin}/2 finalistas`];
    S.push(slidePremio({icon:'🧠',eyebrow:'Premio al bracket original',titulo:'El Visionario',
      nombre:v.n,dato:`${v.hits} aciertos desde el día 1`,
      desc:`De todo lo que llenó <strong>antes de que rodara el balón</strong>, acertó ${linea.join(', ')}${v.campHit?` y sí: <strong>el campeón (${esc(v.campPick)})</strong>`:''}. El que más lejos vio.`}));
  }

  if(A.derrumbe&&A.derrumbe.caida>0)S.push(slidePremio({icon:'📉',eyebrow:'Premio a la ilusión rota',titulo:'El Derrumbe',
    nombre:A.derrumbe.n,dato:`−${A.derrumbe.caida} posiciones`,
    desc:`Llegó a estar <strong>${ordinal(A.derrumbe.desde)}</strong> tras ${esc(A.derrumbe.desdeAt)}… y terminó <strong>${ordinal(A.derrumbe.fin)}</strong>. Lo tuvimos, y lo dejamos ir.`}));

  S.push(slidePremio({icon:'🥄',eyebrow:'Premio con mucho cariño',titulo:'La Cuchara de Palo',
    nombre:A.cuchara.name,dato:`${A.cuchara.total} pts`,
    desc:`Último lugar, pero primero en corazón. Alguien tenía que sostener la tabla desde abajo y lo hizo <strong>todo el torneo</strong>.`}));

  if(A.noLaVio.length){
    const placas=A.noLaVio.map(e=>`<div class="placa"><div class="pn">${esc(e.nombre)}</div>
      <div class="pd">${e.auto?'':`Puso <strong>${esc(e.pick)}</strong> como ${esc(e.cat)}. `}${esc(e.nota)}</div></div>`).join('');
    S.push(`<div class="medalla">🙈</div>
      <div class="eyebrow">Premio a la fe sin fundamento</div>
      <div class="premio-titulo display">No la vio</div>
      <div class="placas">${placas}</div>`);
  }

  if(A.remontada&&A.remontada.subida>0)S.push(slidePremio({icon:'📈',eyebrow:'Premio a no rendirse nunca',titulo:'La Remontada',
    nombre:A.remontada.n,dato:`+${A.remontada.subida} posiciones`,
    desc:`Tras ${esc(A.remontada.desdeAt)} iba <strong>${ordinal(A.remontada.desde)}</strong>. Terminó <strong>${ordinal(A.remontada.fin)}</strong>. Remontada de libro.`,
    extra:`<div class="grafica">${svgTrayectoria(A.cps,A.remontada.n)}</div>`}));

  const chips=[];
  chips.push(`<div class="chip"><div class="cv">${A.totalPuntos.toLocaleString('es')}</div><div class="cl">puntos repartidos</div></div>`);
  chips.push(`<div class="chip"><div class="cv">${A.promedio}</div><div class="cl">promedio por persona</div></div>`);
  if(A.duelo)chips.push(`<div class="chip wide"><div class="cv">${A.duelo.gap===0?'Empate':A.duelo.gap+' pts'}</div><div class="cl">separaron a ${esc(A.duelo.a)} y ${esc(A.duelo.b)} (${ordinal(A.duelo.pos)} vs ${ordinal(A.duelo.pos+1)})</div></div>`);
  if(A.masExactosPartido)chips.push(`<div class="chip wide"><div class="cv">${A.masExactosPartido.cnt} lo clavaron</div><div class="cl">${esc(A.masExactosPartido.txt)} · el más pronosticable</div></div>`);
  (A.premioStats||[]).forEach(ps=>{
    const uno=ps.aciertan.length===1;
    chips.push(`<div class="chip wide"><div class="cv">${uno?esc(ps.aciertan[0]):ps.aciertan.length+' personas'}</div><div class="cl">le ${uno?'atinó':'atinaron'} a ${esc(ps.cat)}: ${esc(ps.real)}${!uno?' — '+esc(ps.aciertan.join(', ')):''}</div></div>`);
  });
  if(A.nadieLoVio)chips.push(`<div class="chip wide"><div class="cv">0 personas</div><div class="cl">vieron venir el ${esc(A.nadieLoVio.match)} (${A.nadieLoVio.prob}% según ${esc(A.nadieLoVio.fuente)})</div></div>`);
  S.push(`<div class="medalla">📊</div>
    <div class="eyebrow">Para cerrar con números</div>
    <div class="premio-titulo display">Datos Curiosos</div>
    <div class="chips">${chips.join('')}</div>`);

  const [p1,p2,p3]=A.podio;
  S.push(`<div class="eyebrow">El momento de la verdad</div>
    <div class="premio-titulo display">El Podio</div>
    <div class="podio">
      <div class="col p2"><div class="pn">${esc(p2?.name||'—')}</div><div class="caja"><div class="pos">2°</div><div class="pp">${p2?.total??0} pts</div></div></div>
      <div class="col p1"><div class="pn" style="font-size:16px">${previa?'?????':esc(p1?.name||'—')}</div><div class="caja"><div class="pos">1°</div><div class="pp">${p1?.total??0} pts</div></div></div>
      <div class="col p3"><div class="pn">${esc(p3?.name||'—')}</div><div class="caja"><div class="pos">3°</div><div class="pp">${p3?.total??0} pts</div></div></div>
    </div>
    <p class="desc">${previa?'El primer lugar se revela cuando acabe el mundial… aunque ya se lo huelen.':'Un aplauso para el podio. Siguiente slide para coronar.'}</p>`);

  S.push(slidePremio({icon:'👑',eyebrow:previa?'Líder al día de hoy':'Campeón del mundo (de la quiniela)',
    titulo:previa?'El Líder':'El Campeón',nombre:A.campeon.name,
    dato:`${A.campeon.total} pts`,
    desc:previa?`Va arriba con <strong>${A.campeon.total} puntos</strong>. Falta lo que falta — nadie cante victoria.`
      :`<strong>${A.campeon.total} puntos</strong> de principio a fin. Esta es su trayectoria completa. Que pase a recoger su premio (y a presumir un año entero).`,
    extra:`<div class="grafica">${svgTrayectoria(A.cps,A.campeon.name)}</div>`}));

  S.push(`<div class="logo-copa">🫡</div>
    <div class="eyebrow">Fin de la ceremonia</div>
    <div class="premio-titulo display" style="font-size:clamp(28px,8vw,46px)">${esc(GALA_CONFIG.fraseCierre)}</div>
    <p class="desc">Gracias a todos por jugar, por pelear cada punto y por no abandonar el grupo. Nos vemos en 2030.</p>`);

  return S;
}

/* ════════ NAVEGACIÓN TIPO STORIES ════════ */
let cur=0,N=0;
function goTo(i){
  if(i<0||i>=N)return;
  cur=i;
  document.querySelectorAll('.slide').forEach((el,k)=>{
    el.classList.toggle('active',k===i);
    el.classList.toggle('prev',k<i);
  });
  document.querySelectorAll('#progress .seg').forEach((el,k)=>{
    el.classList.toggle('done',k<i);
    el.classList.toggle('active',k===i);
  });
  if(i===N-2)lanzarConfetti(); // slide del campeón
}
function lanzarConfetti(){
  if(window._confettiDone||matchMedia('(prefers-reduced-motion: reduce)').matches)return;
  window._confettiDone=true;
  const colores=['#FFD100','#3B6FD1','#EF3340','#FFFFFF'];
  const host=document.querySelector('.slide.active')||document.body;
  for(let i=0;i<70;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colores[i%colores.length];
    c.style.animationDuration=(2.4+Math.random()*2.2)+'s';
    c.style.animationDelay=(Math.random()*1.4)+'s';
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    host.appendChild(c);
    setTimeout(()=>c.remove(),6500);
  }
}
function initNav(){
  document.getElementById('tapR').addEventListener('click',()=>goTo(cur+1));
  document.getElementById('tapL').addEventListener('click',()=>goTo(cur-1));
  document.getElementById('arrR').addEventListener('click',()=>goTo(cur+1));
  document.getElementById('arrL').addEventListener('click',()=>goTo(cur-1));
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowRight'||e.key===' ')goTo(cur+1);
    if(e.key==='ArrowLeft')goTo(cur-1);
  });
  let x0=null;
  document.addEventListener('touchstart',e=>{x0=e.touches[0].clientX;},{passive:true});
  document.addEventListener('touchend',e=>{
    if(x0===null)return;
    const dx=e.changedTouches[0].clientX-x0;
    if(Math.abs(dx)>48)goTo(cur+(dx<0?1:-1));
    x0=null;
  },{passive:true});
}

/* ════════ ARRANQUE ════════ */
async function fetchCSV(url){
  const r=await fetch(url+'&t='+Date.now(),{cache:'no-store'});
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.text();
}
async function ini(){
  try{
    const [clas,res,cap,ko]=await Promise.all([
      fetchCSV(CSV_CLASIFICACION),fetchCSV(CSV_RESULTADOS),
      fetchCSV(CSV_CAPTURA),fetchCSV(CSV_CAPTURA_KO).catch(()=>''),
    ]);
    D.clas=parseClasificacion(clas);
    D.res=parseResultados(res);
    D.cap=parseCaptura(cap);
    D.ko=ko?parseCapturaKO(ko):{};
    if(!D.clas||!D.cap)throw new Error('CSV incompleto');
    const A=computeAwards();
    const slides=buildSlides(A);
    N=slides.length;
    document.getElementById('slides').innerHTML=slides.map(s=>`<div class="slide">${s}</div>`).join('');
    document.getElementById('progress').innerHTML=slides.map(()=>'<div class="seg"><i></i></div>').join('');
    initNav();
    goTo(0);
    document.getElementById('loader').classList.add('off');
  }catch(err){
    console.error(err);
    document.getElementById('loadmsg').textContent='No se pudieron cargar los datos. Revisa tu conexión.';
    document.getElementById('retry').style.display='block';
  }
}
ini();
</script>
